openapi: "3.1.0"
info:
  title: Notes API (Lecture 9 — with persistence)
  version: "0.2.0"
  description: >
    Updated API with real PostgreSQL persistence.
    Extends L6 stub endpoints with database-backed CRUD.

paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /notes/create:
    post:
      summary: Create a new note
      operationId: createNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteCreate"
      responses:
        "201":
          description: Note created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/{note_id}:
    get:
      summary: Get a note by ID
      operationId: getNoteById
      parameters:
        - name: note_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Note found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteResponse"
        "404":
          description: Note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      summary: Delete a note by ID
      operationId: deleteNote
      parameters:
        - name: note_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Note deleted successfully
        "404":
          description: Note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/search:
    post:
      summary: Search notes
      operationId: searchNotes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteSearchQuery"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteSearchResult"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          example: "ok"
        version:
          type: string
          example: "0.2.0"

    NoteCreate:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
        tags:
          type: array
          items:
            type: string
          default: []

    NoteResponse:
      type: object
      required: [id, title, content, tags, created_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    NoteSearchQuery:
      type: object
      properties:
        query:
          type: string
          default: ""
        tags:
          type: array
          items:
            type: string
          default: []
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 10

    NoteSearchResult:
      type: object
      required: [results, total]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/NoteResponse"
        total:
          type: integer

    ErrorResponse:
      type: object
      required: [detail, error_code]
      properties:
        detail:
          type: string
        error_code:
          type: string
